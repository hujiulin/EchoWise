name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Tag for the release (e.g. v0.1.0). Leave blank to use commit-based draft."
        required: false

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-14
            args: "--target aarch64-apple-darwin"
            label: "macOS (Apple Silicon)"
            rust-target: "aarch64-apple-darwin"
          - platform: windows-latest
            args: ""
            label: "Windows"
            rust-target: ""

    runs-on: ${{ matrix.platform }}
    name: Build ${{ matrix.label }}

    steps:
      - uses: actions/checkout@v4

      - name: Sanity-check tag matches in-tree version
        # The Tauri bundler writes the version from tauri.conf.json into every
        # binary (file name, MSI metadata, Info.plist, updater latest.json).
        # If the git tag is bumped but the source files aren't (or vice versa),
        # the release ends up with the WRONG version baked into every artifact
        # — confusing users and breaking the in-app updater. Catch the
        # mismatch here so we fail in 5 seconds instead of after a 15-minute
        # cross-platform build.
        shell: bash
        run: |
          RAW_REF="${{ github.event.inputs.version || github.ref_name }}"
          # Skip when triggered manually without a tag (commit-based draft).
          if [[ -z "$RAW_REF" || "$RAW_REF" == "main" ]]; then
            echo "No tag provided; skipping version-match check."
            exit 0
          fi
          TAG_VERSION="${RAW_REF#v}"
          echo "Tag version: $TAG_VERSION"

          fail=0
          check() {
            local label="$1" actual="$2"
            if [[ "$actual" != "$TAG_VERSION" ]]; then
              echo "::error::$label is '$actual' but the tag is 'v$TAG_VERSION'."
              fail=1
            else
              echo "  $label: $actual ✓"
            fi
          }
          check "tauri.conf.json" "$(node -p "require('./src-tauri/tauri.conf.json').version")"
          check "package.json"    "$(node -p "require('./package.json').version")"
          check "Cargo.toml"      "$(grep -m1 '^version' src-tauri/Cargo.toml | sed -E 's/^version *= *"(.+)"/\1/')"
          if [[ $fail -ne 0 ]]; then
            echo ""
            echo "Bump the in-tree version files before pushing the tag, e.g.:"
            echo "  - src-tauri/tauri.conf.json   \"version\": \"$TAG_VERSION\""
            echo "  - package.json                \"version\": \"$TAG_VERSION\""
            echo "  - src-tauri/Cargo.toml        version = \"$TAG_VERSION\""
            echo "  (run \`cargo update -p echowise --offline\` in src-tauri/ to refresh Cargo.lock)"
            exit 1
          fi

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-target }}

      - name: Cache cargo
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install Linux deps (skipped for non-linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install npm deps
        run: npm ci

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Updater signing — required for the in-app updater to verify artifacts.
          # See README "Auto-update setup" for how to generate and add these.
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          # macOS ad-hoc code signing. Without an Apple Developer ID we cannot
          # notarize, but ad-hoc signing ("-") at least registers the app
          # binary with the system so Gatekeeper reports it as "unidentified
          # developer" (right-click → Open works) instead of the much scarier
          # "app is damaged and can't be opened" that an *unsigned* .app
          # downloaded via the quarantine bit triggers.
          APPLE_SIGNING_IDENTITY: ${{ matrix.platform == 'macos-14' && '-' || '' }}
        with:
          tagName: ${{ github.event.inputs.version || github.ref_name }}
          releaseName: "EchoWise ${{ github.event.inputs.version || github.ref_name }}"
          releaseBody: |
            Auto-built EchoWise release.

            **Downloads**
            - **macOS**: `.dmg` for Apple Silicon (M1/M2/M3+)
            - **Windows**: `.msi` installer and portable `.exe`

            Existing users will receive this update automatically the next
            time they open EchoWise (if signing secrets are configured).

            See the README for setup instructions.
          releaseDraft: true
          prerelease: false
          # Tauri 2 emits the signed updater bundle + a `latest.json` manifest
          # automatically when TAURI_SIGNING_PRIVATE_KEY is set.
          includeUpdaterJson: true
          args: ${{ matrix.args }}
